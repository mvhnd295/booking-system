services:

  db:
    image: postgres:16-alpine
    container_name: flowcare-db
    environment:
      POSTGRES_DB: flowcare
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d flowcare"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: flowcare-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/flowcare
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
